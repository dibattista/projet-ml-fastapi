site_name: Futurisys — API Attrition
site_description: Documentation technique de l'API de prédiction d'attrition des employés TechNova Partners
site_author: Barbara Di Battista
site_url: https://dibattista.github.io/projet-ml-fastapi/

repo_name: dibattista/projet-ml-fastapi
repo_url: https://github.com/dibattista/projet-ml-fastapi

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: deep purple
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Passer en mode sombre
    - scheme: slate
      primary: deep purple
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Passer en mode clair
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: fr

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html

nav:
  - Accueil: index.md
  - Installation: installation.md
  - API Reference: api.md
  - Modèle ML: modele.md
  - Tests: tests.md
  - CI/CD: cicd.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dibattista/projet-ml-fastapi
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/barbara-di-battista
  version:
    provider: mike
