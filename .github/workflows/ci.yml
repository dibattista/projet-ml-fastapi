name: CI — Tests & Couverture

on:
  push:
    branches: [main, develop]   # déclenché sur push
  pull_request:
    branches: [main, develop]   # déclenché sur PR (validation avant merge)

jobs:
  test:
    runs-on: ubuntu-latest       # machine virtuelle GitHub

    env:
      SECRET_KEY: ${{ secrets.SECRET_KEY }}   # injecté depuis GitHub Secrets
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      DATABASE_URL: sqlite:///./test.db       # SQLite pour le CI (pas PostgreSQL)

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: 🐍 Configurer Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Installer les dépendances
        run: pip install -r requirements.txt

      - name: 🧪 Lancer les tests avec couverture
        run: pytest --cov=app --cov-report=term-missing -v

      - name: 📊 Afficher le rapport de couverture
        if: always()   # s'affiche même si les tests échouent
        run: pytest --cov=app --cov-report=term-missing --no-header -q